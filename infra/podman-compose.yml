version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ml-obs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - ml-obs-network

  postgres:
    image: postgres:15-alpine
    container_name: ml-obs-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ml_observability
      POSTGRES_USER: mlobs
      POSTGRES_PASSWORD: mlobs_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlobs -d ml_observability"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ml-obs-network

  prometheus:
    image: prom/prometheus:latest
    container_name: ml-obs-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - ml-obs-network

  grafana:
    image: grafana/grafana:latest
    container_name: ml-obs-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ml-obs-network

  inference-api:
    build:
      context: ../inference-api
      dockerfile: Dockerfile
    container_name: ml-obs-inference-api
    ports:
      - "8001:8001"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODEL_VERSION: 1.0.0
      LOG_LEVEL: INFO
      ENVIRONMENT: production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ml-obs-network

  drift-service:
    build:
      context: ../drift-service
      dockerfile: Dockerfile
    container_name: ml-obs-drift-service
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ml_observability
      POSTGRES_USER: mlobs
      POSTGRES_PASSWORD: mlobs_pass
      STREAM_NAME: ml-events
      ALERT_STREAM_NAME: ml-alerts
      CONSUMER_GROUP: drift-detector
      CONSUMER_NAME: drift-worker-1
      BASELINE_WINDOW_SIZE: 100
      SLIDING_WINDOW_SIZE: 100
      DRIFT_THRESHOLD_PSI: 0.2
      DRIFT_THRESHOLD_KS: 0.05
      CHECK_INTERVAL_MS: 1000
      METRICS_PORT: 8000
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ml-obs-network

  replay-service:
    build:
      context: ../replay-service
      dockerfile: Dockerfile
    container_name: ml-obs-replay-service
    ports:
      - "8002:8002"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ml_observability
      POSTGRES_USER: mlobs
      POSTGRES_PASSWORD: mlobs_pass
      INFERENCE_API_URL: http://inference-api:8001
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      inference-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ml-obs-network

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  ml-obs-network:
    driver: bridge

