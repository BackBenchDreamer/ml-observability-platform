services:
  redis:
    image: redis:7-alpine
    container_name: ml-obs-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - ml-obs-network

  postgres:
    image: postgres:15-alpine
    container_name: ml-obs-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ml-obs-network

  prometheus:
    image: prom/prometheus:latest
    container_name: ml-obs-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - ml-obs-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ml-obs-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - ml-obs-network

  webhook-receiver:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    container_name: ml-obs-webhook-receiver
    ports:
      - "5001:5001"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - ml-obs-network

  grafana:
    image: grafana/grafana:latest
    container_name: ml-obs-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ml-obs-network

  inference-api:
    build:
      context: ../inference-api
      dockerfile: Dockerfile
    container_name: ml-obs-inference-api
    ports:
      - "8001:8001"
    env_file:
      - ../inference-api/.env.example
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      ENVIRONMENT: ${ENVIRONMENT}
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - ml-obs-network

  drift-service:
    build:
      context: ../drift-service
      dockerfile: Dockerfile
    container_name: ml-obs-drift-service
    ports:
      - "8000:8000"
    env_file:
      - ../drift-service/.env.example
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - ml-obs-network

  replay-service:
    build:
      context: ../replay-service
      dockerfile: Dockerfile
    container_name: ml-obs-replay-service
    ports:
      - "8002:8002"
    env_file:
      - ../replay-service/.env.example
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      INFERENCE_API_URL: http://inference-api:8001
    depends_on:
      - postgres
      - inference-api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - ml-obs-network

  data-generator:
    build:
      context: ../data-generator
      dockerfile: Dockerfile
    container_name: ml-obs-data-generator
    env_file:
      - ../data-generator/.env.example
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      STREAM_NAME: ml-events
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - ml-obs-network

volumes:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  ml-obs-network:
    driver: bridge
