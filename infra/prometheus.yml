# Prometheus Configuration for ML Observability Platform
# Phase 1: Infrastructure Setup

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Inference API (Phase 3)
  # Serves ML model predictions
  - job_name: 'inference-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['inference-api:8001']

  # Data Generator (Phase 2)
  # Generates synthetic data for testing
  # DISABLED: data-generator does not expose metrics endpoint
  # - job_name: 'data-generator'
  #   metrics_path: '/metrics'
  #   static_configs:
  #     - targets: ['data-generator:8002']

  # Drift Service (Phase 4)
  # Detects data drift in ML predictions
  - job_name: 'drift-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['drift-service:8000']

